<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>杂草框选 + 根茎定位</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container">
    <section class="card">
        <h1>YOLOv8 Pose 杂草检测</h1>
        <p class="desc">上传图片后，页面会返回杂草边界框、根茎关键点和可视化结果图。</p>

        <form th:action="@{/predict}" method="post" enctype="multipart/form-data" class="form">
            <label class="label">
                <span>选择图片</span>
                <input type="file" name="file" accept=".jpg,.jpeg,.png,.bmp" required>
            </label>
            <label class="label">
                <span>置信度 (0.01 ~ 1.0)</span>
                <input type="number" step="0.01" min="0.01" max="1.0" name="conf"
                       th:value="${request != null ? request.conf : 0.25}" required>
            </label>
            <label class="label">
                <span>类别过滤（可选，示例：1 或 0,1，留空=全部）</span>
                <input type="text" name="classes" th:value="${request != null ? request.classes : '1'}">
            </label>
            <button type="submit">开始检测</button>
        </form>

        <p th:if="${error}" class="error" th:text="${error}"></p>
    </section>

    <section class="card" th:if="${prediction != null}">
        <h2>检测结果</h2>
        <div class="grid">
            <div>
                <h3>原图</h3>
                <img th:src="${prediction.originalImageUrl}" alt="原图">
            </div>
            <div>
                <h3>推理结果图</h3>
                <img th:src="${prediction.outputImageUrl}" alt="检测图">
            </div>
        </div>

        <h3>目标列表</h3>
        <table>
            <thead>
            <tr>
                <th>#</th>
                <th>类别</th>
                <th>置信度</th>
                <th>BBox(x1,y1,x2,y2)</th>
                <th>Stem(x,y)</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(prediction.result.detections)}">
                <td colspan="5">未检出目标</td>
            </tr>
            <tr th:each="det, stat : ${prediction.result.detections}">
                <td th:text="${stat.count}"></td>
                <td th:text="${det.className + ' (' + det.classId + ')'}"></td>
                <td th:text="${#numbers.formatDecimal(det.confidence, 1, 4)}"></td>
                <td th:text="${'(' + #numbers.formatDecimal(det.bbox.x1,1,1) + ', ' + #numbers.formatDecimal(det.bbox.y1,1,1) + ', ' + #numbers.formatDecimal(det.bbox.x2,1,1) + ', ' + #numbers.formatDecimal(det.bbox.y2,1,1) + ')'}"></td>
                <td th:text="${'(' + #numbers.formatDecimal(det.stem.x,1,1) + ', ' + #numbers.formatDecimal(det.stem.y,1,1) + ')'}"></td>
            </tr>
            </tbody>
        </table>

        <details>
            <summary>运行日志</summary>
            <pre th:text="${prediction.runtimeLog}"></pre>
        </details>
    </section>
</main>
</body>
</html>
